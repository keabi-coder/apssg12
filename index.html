<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Profile</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);
            max-width: 400px;
        }

        h1 { margin-top: 0; }

        .skills span {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            margin: 5px;
            border-radius: 50px;
            font-size: 0.9rem;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background: white;
            color: #764ba2;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hi, I'm Keabzend Bekele! 👋</h1>
        <p>Welcome to short notes world</p>
        
        <!-- <div class="skills">
            <span>Development</span>
            <span>Design</span>
            <span>Collaboration</span>
        </div> -->

        <br>
        <!-- <a href="https://github.com/yourusername" class="btn">View My GitHub</a> -->
    </div>

</body>
</html>
